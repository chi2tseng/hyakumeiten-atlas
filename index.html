<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百名店 · Tabelog Hyakumeiten Atlas</title>
  <meta name="description" content="Tabelog 過去 10 年百名店全國 10,067 家餐廳地圖 — 篩選、定位、評論" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..600,0..1,-25..200&display=block" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <link rel="stylesheet" href="./styles.css?v=20260616a" />
</head>
<body>

  <!-- Top nav -->
  <header class="top-nav">
    <div class="brand">
      <span class="brand-mark" role="img" aria-label="百名店 Hyakumeiten">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="20" y="20" width="60" height="9" rx="4.5" fill="currentColor"/>
          <path fill-rule="evenodd" clip-rule="evenodd" fill="currentColor"
            d="M35 36 H65 a9 9 0 0 1 9 9 V73 a9 9 0 0 1 -9 9 H35 a9 9 0 0 1 -9 -9 V45 a9 9 0 0 1 9 -9 Z M35 45 h30 v10 h-30 Z M35 63 h30 v10 h-30 Z"/>
        </svg>
      </span>
    </div>

    <nav class="nav-actions">
      <button class="btn btn-secondary" id="locate-btn">
        <span class="msi">my_location</span>
        <span data-i18n="locate">使用我的位置</span>
      </button>
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="zh">中</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ja">日</button>
      </div>
    </nav>
  </header>

  <main class="layout">
    <!-- Sidebar with filters + list -->
    <aside class="sidebar" id="sidebar">
      <!-- mobile sheet drag handle (hidden on desktop) -->
      <div class="sheet-handle" id="sheet-handle" aria-hidden="true"><span></span></div>

      <!-- mobile: single-row filter chips (Google-Maps style; hidden on desktop) -->
      <div class="filter-chips" id="filter-chips">
        <label class="chip chip-search">
          <span class="msi">search</span>
          <input id="m-search" placeholder="搜尋" data-i18n-ph="search-ph-short" />
        </label>
        <select class="chip chip-select" id="m-pref" aria-label="都道府縣"><option value="" data-i18n="pref-label">都道府縣</option></select>
        <select class="chip chip-select" id="m-cat" aria-label="分類"><option value="" data-i18n="cat-label">分類</option></select>
        <select class="chip chip-select" id="m-price" aria-label="預算">
          <option value="" data-i18n="price-chip">預算</option>
          <option value="1999">¥2,000</option>
          <option value="2999">¥3,000</option>
          <option value="3999">¥4,000</option>
          <option value="5999">¥6,000</option>
          <option value="9999">¥10,000</option>
        </select>
        <select class="chip chip-select" id="m-rating" aria-label="評分">
          <option value="0" data-i18n="rating-chip">評分</option>
          <option value="3.5">3.5+</option>
          <option value="3.7">3.7+</option>
          <option value="3.9">3.9+</option>
          <option value="4.0">4.0+</option>
        </select>
        <select class="chip chip-select" id="m-reserve" aria-label="訂位">
          <option value="" data-i18n="reserve-label">可否訂位</option>
          <option value="net" data-i18n="reserve-net">網路預約</option>
          <option value="phone" data-i18n="reserve-phone">電話預約</option>
          <option value="no" data-i18n="reserve-no">不可訂位</option>
        </select>
      </div>

      <section class="filter-panel">
        <div class="filter-header">
          <h2 class="eyebrow" data-i18n="filters">篩選</h2>
          <button class="sheet-close-mobile" id="sheet-close-mobile" aria-label="Close" title="">
            <span class="msi">close</span>
          </button>
        </div>

        <div class="filter-group">
          <label class="filter-label" data-i18n="search-label">關鍵字</label>
          <input type="text" class="text-input" id="search-input" placeholder="店名 / 地址 / 分類…" data-i18n-ph="search-ph" />
        </div>

        <div class="filter-group">
          <label class="filter-label" data-i18n="pref-label">都道府縣</label>
          <select class="text-input" id="pref-select">
            <option value="" data-i18n="all">全部</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label" data-i18n="cat-label">分類</label>
          <select class="text-input" id="cat-select">
            <option value="" data-i18n="all">全部</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label" data-i18n="price-label">晚餐預算上限</label>
          <div class="pill-group" id="price-pills">
            <button class="pill" data-price="">∞</button>
            <button class="pill" data-price="1999">¥2,000</button>
            <button class="pill" data-price="2999">¥3,000</button>
            <button class="pill" data-price="3999">¥4,000</button>
            <button class="pill" data-price="5999">¥6,000</button>
            <button class="pill" data-price="9999">¥10,000</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-label" data-i18n="rating-label">最低評分</label>
          <div class="pill-group" id="rating-pills">
            <button class="pill active" data-rating="0">∞</button>
            <button class="pill" data-rating="3.5">3.5+</button>
            <button class="pill" data-rating="3.7">3.7+</button>
            <button class="pill" data-rating="3.9">3.9+</button>
            <button class="pill" data-rating="4.0">4.0+</button>
          </div>
        </div>

        <div class="filter-group" id="reserve-group" style="display:none">
          <label class="filter-label" data-i18n="reserve-label">可否訂位</label>
          <div class="pill-group" id="reserve-pills">
            <button class="pill active" data-reserve="" data-i18n="all">全部</button>
            <button class="pill" data-reserve="net" data-i18n="reserve-net">網路預約</button>
            <button class="pill" data-reserve="phone" data-i18n="reserve-phone">電話預約</button>
            <button class="pill" data-reserve="no" data-i18n="reserve-no">不可訂位</button>
          </div>
        </div>

      </section>

      <!-- desktop sliding-sheet grip — click or drag to cover/restore filter panel -->
      <div class="sheet-grip" id="sheet-grip" role="button" tabindex="0" aria-label="展開列表" title="展開列表">
        <span class="sheet-grip-bar"></span>
        <span class="sheet-grip-arrow msi">keyboard_arrow_up</span>
      </div>

      <div class="stats-row" id="stats-row" style="display:none">
        <span id="stats-count">0</span>
        <span data-i18n="stats">家符合條件</span>
      </div>

      <section class="result-list" id="result-list">
        <!-- restaurant cards injected here -->
      </section>

      <!-- mobile: selected restaurant detail rendered INSIDE the sheet (map stays visible) -->
      <section class="sheet-detail" id="sheet-detail">
        <button class="sheet-detail-back" id="sheet-detail-back">
          <span class="msi">arrow_back</span><span data-i18n="back">返回</span>
        </button>
        <div class="sheet-detail-content" id="sheet-detail-content"></div>
      </section>
    </aside>

    <!-- Map -->
    <section class="map-section">
      <div id="map"></div>
      <button class="recenter-btn" id="recenter-btn" aria-label="Recenter on me" title="回到我的位置">
        <span class="msi">my_location</span>
      </button>
      <!-- mobile-only filter toggle FAB -->
      <button class="mobile-filter-fab" id="mobile-filter-fab" aria-label="Filters" title="">
        <span class="msi">tune</span>
      </button>
    </section>

  <!-- Restaurant detail drawer (replaces sidebar from left) -->
  <aside class="drawer" id="detail-drawer">
    <header class="drawer-header">
      <button class="drawer-back" id="drawer-close" aria-label="Back">
        <span class="msi">arrow_back</span>
        <span data-i18n="back">返回</span>
      </button>
    </header>
    <div class="drawer-content" id="drawer-content"></div>
  </aside>
  </main>

  <!-- Photo lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">
      <span class="msi">close</span>
    </button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous">
      <span class="msi">chevron_left</span>
    </button>
    <div class="lightbox-stage"><img id="lightbox-img" alt="" /></div>
    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next">
      <span class="msi">chevron_right</span>
    </button>
    <div class="lightbox-count" id="lightbox-count"></div>
  </div>

  <script src="./i18n.js?v=20260616a"></script>
  <script src="./app.js?v=20260616a"></script>
</body>
</html>
